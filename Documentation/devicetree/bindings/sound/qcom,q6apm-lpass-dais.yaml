# SPDX-License-Identifier: GPL-2.0 OR BSD-2-Clause
%YAML 1.2
---
$id: http://devicetree.org/schemas/sound/qcom,q6apm-lpass-dais.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Qualcomm DSP LPASS (Low Power Audio SubSystem) Audio Ports

maintainers:
  - Krzysztof Kozlowski <krzysztof.kozlowski@linaro.org>
  - Srinivas Kandagatla <srinivas.kandagatla@linaro.org>

allOf:
  - $ref: dai-common.yaml#

properties:
  compatible:
    enum:
      - qcom,q6apm-lpass-dais

  '#sound-dai-cells':
    const: 1

  '#address-cells':
    const: 1

  '#size-cells':
    const: 0

# Digital Audio Interfaces
patternProperties:
  '^dai@[0-9]+$':
    type: object
    description:
      Q6DSP Digital Audio Interfaces.

    properties:
      reg:
        maxItems: 1
        description:
          Digital Audio Interface ID

      clocks:
        minItems: 1
        items:
          - description: MI2S master clock
          - description: MI2S bit clock
          - description: MI2S external bit clock

      clock-names:
        minItems: 1
        maxItems: 3
        items:
          enum: [mclk, bclk, eclk]

    dependencies:
      clocks: [clock-names]
      clock-names: [clocks]

    required:
      - reg

    additionalProperties: false

required:
  - compatible
  - '#sound-dai-cells'

unevaluatedProperties: false

examples:
  - |
    #include <dt-bindings/sound/qcom,q6afe.h>

    dais {
        compatible = "qcom,q6apm-lpass-dais";
        #sound-dai-cells = <1>;
        #address-cells = <1>;
        #size-cells = <0>;

        dai@16 {
           reg = <PRIMARY_MI2S_RX>;
           clocks = <&q6prmcc LPASS_CLK_ID_MCLK_1
                              LPASS_CLK_ATTRIBUTE_COUPLE_NO>,
                    <&q6prmcc LPASS_CLK_ID_PRI_MI2S_IBIT
                              LPASS_CLK_ATTRIBUTE_COUPLE_NO>,
                    <&q6prmcc LPASS_CLK_ID_PRI_MI2S_EBIT
                              LPASS_CLK_ATTRIBUTE_COUPLE_NO>;
           clock-names = "mclk", "bclk", "eclk";
        };
    };
